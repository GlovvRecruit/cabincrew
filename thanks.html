<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg: #f5f5f4;
  --white: #ffffff;
  --text: #111111;
  --text-muted: #555555;
  --text-light: #9ca3af;
  --border: #e5e7eb;
  --sky: #4A90E2;
  --sky-soft: #E8F2FC;
  --navy: #1e3a5f;
}

html,body{
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 17px;
  line-height: 1.8;
  min-height: 100vh;
}

.container{
  max-width: 560px;
  margin: 0 auto;
  padding: 60px 24px 80px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 로고 */
.logo {
  width: 120px;
  margin: 0 auto 48px;
  display: block;
}

/* 성공 카드 */
.success-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 56px 36px 48px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
  position: relative;
  overflow: hidden;
}

.success-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, #4A90E2 0%, #87B5E8 50%, #4A90E2 100%);
}

/* 체크마크 아이콘 */
.checkmark-wrap {
  width: 88px;
  height: 88px;
  background: linear-gradient(135deg, #5BA3F5 0%, #4A90E2 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  box-shadow: 0 8px 24px rgba(74, 144, 226, 0.35);
  position: relative;
  animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.checkmark-wrap::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px solid rgba(74, 144, 226, 0.2);
  animation: ripple 2s ease-out infinite;
}

.checkmark {
  width: 44px;
  height: 44px;
  color: #fff;
}

@keyframes scaleIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes ripple {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(1.3); opacity: 0; }
}

/* 타이틀 */
.title {
  font-size: 28px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1.3;
  margin-bottom: 12px;
}

.subtitle {
  font-size: 15px;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 32px;
  letter-spacing: -0.01em;
}

/* 안내 메시지 */
.message-block {
  background: linear-gradient(135deg, #F8FAFD 0%, #E8F2FC 100%);
  border: 1px solid rgba(74, 144, 226, 0.15);
  border-radius: 16px;
  padding: 28px 28px;
  margin-bottom: 24px;
  text-align: left;
}

.message-block p {
  font-size: 15px;
  color: var(--text);
  line-height: 1.85;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.message-block p + p {
  margin-top: 16px;
}

.message-block strong {
  color: var(--navy);
  font-weight: 800;
}

.message-block .em-sky {
  color: var(--sky);
  font-weight: 700;
}

/* 업무시간 안내 */
.hours-note {
  background: #fafafa;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 22px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  text-align: left;
}

.hours-note-icon {
  flex-shrink: 0;
  font-size: 20px;
  line-height: 1.4;
}

.hours-note-text {
  font-size: 13.5px;
  color: var(--text-muted);
  line-height: 1.7;
  font-weight: 500;
}

/* 하단 액션 */
.bottom-actions {
  margin-top: 40px;
  text-align: center;
}

.action-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-light);
  font-size: 13px;
  text-decoration: none;
  font-weight: 500;
  padding: 10px 16px;
  border-radius: 8px;
  transition: color 0.15s;
}

.action-link:hover {
  color: var(--text-muted);
}

/* 모바일 */
@media(max-width: 600px){
  .container { padding: 40px 20px 60px; }
  .logo { margin-bottom: 36px; width: 100px; }
  .success-card { padding: 44px 24px 36px; border-radius: 20px; }
  .checkmark-wrap { width: 72px; height: 72px; margin-bottom: 20px; }
  .checkmark { width: 36px; height: 36px; }
  .title { font-size: 24px; }
  .subtitle { font-size: 14px; margin-bottom: 24px; }
  .message-block { padding: 22px 20px; }
  .message-block p { font-size: 14px; }
  .hours-note { padding: 14px 18px; }
  .hours-note-text { font-size: 12.5px; }
}
</style>

<div class="container">

  <img src="https://upload.cafenono.com/image/logo/20250427/074222_PYzZMaknLgzVLU2Pgd?q=90&s=1280x1" alt="Glovv" class="logo"/>

  <div class="success-card">

    <div class="checkmark-wrap">
      <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <h1 class="title">등록해주셔서 감사합니다!</h1>
    <p class="subtitle">글로브 전직 승무원 풀 등록이 완료되었습니다</p>

    <div class="message-block">
      <p>
        잠시만 기다려주시면,<br/>
        <strong>글로브 담당자가 곧 연락드릴 예정</strong>입니다.
      </p>
      <p>
        <span class="em-sky">앱 설치 후 협업 안내</span>까지<br/>
        차근차근 안내드릴게요.
      </p>
    </div>

    <div class="hours-note">
      <span class="hours-note-icon">🕐</span>
      <p class="hours-note-text">
        오늘이 영업일이 아닌 경우,<br/>
        <strong style="color:var(--text);font-weight:700;">영업일 출근 후 가장 빠른 시간</strong>에 연락드릴게요.
      </p>
    </div>

  </div>

  <div class="bottom-actions">
    <a href="https://glovvrecruit.github.io/cabincrew/" class="action-link">
      ← 공고 페이지로 돌아가기
    </a>
  </div>

</div>
